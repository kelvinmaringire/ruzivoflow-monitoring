# Edit global SMTP settings for your provider. Keep the password OUT of this file:
# put the SMTP password (single line) in secrets/smtp_password (see README).
#
global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.example.com:587"
  smtp_from: "alerts@example.com"
  smtp_auth_username: "alerts@example.com"
  smtp_auth_password_file: "/etc/alertmanager-secret/smtp_password"

route:
  receiver: email
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: email
    email_configs:
      - to: "ops@example.com"
        send_resolved: true
        headers:
          Subject: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
