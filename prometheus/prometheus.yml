global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      scheme: http
      timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
    metrics_path: /metrics

  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
    metrics_path: /metrics

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]
    metrics_path: /metrics

  - job_name: promtail
    static_configs:
      - targets: ["promtail:9080"]
    metrics_path: /metrics
